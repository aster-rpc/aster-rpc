[graph]
targets = []

[advisories]
version = 2

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BlueOak-1.0.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Our own workspace crates don't have license fields yet
[[licenses.clarify]]
name = "aster_rs"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "aster_transport_core"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "aster_transport_ffi"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "aster-transport-napi"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
