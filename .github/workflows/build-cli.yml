name: Build & Publish aster-cli

# Triggers:
#   - push to main on cli/** or this file: rebuild CLI (sdist/wheel + Nuitka
#     native binary). Native job consumes the latest published aster-rpc
#     dev wheel rather than rebuilding the pyo3 module from source.
#   - cli-v* tag: full release flow (sdist/wheel/native + GH Release + PyPI).
#     Native job pip-installs aster-rpc from PyPI.
#   - workflow_run after Build & Publish Wheels completes on main: rebuild
#     CLI native so it picks up the just-published aster-rpc dev wheel.
#     Scoped to main only -- v* tags don't auto-trigger a CLI release
#     (CLI is independently versioned via cli-v*).
#   - workflow_dispatch.

on:
  push:
    branches: [main]
    tags: ["cli-v*"]
    paths:
      - 'cli/**'
      - '.github/workflows/build-cli.yml'
  workflow_run:
    workflows: ["Build & Publish Wheels"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-cli-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Compute version + resolve aster-rpc wheel source ─────────────
  # aster-cli versioning is independent of aster-rpc. The source of
  # truth is cli/pyproject.toml. Dev builds append .devN for the run.
  #
  # The native job needs an aster-rpc wheel installed before Nuitka.
  # We resolve where it comes from here so the native job is dumb:
  #   - cli-v* tag: PyPI (assumes framework already published)
  #   - main push / workflow_run: latest dev-<N> internal release
  version:
    runs-on: [self-hosted, Linux, X64]
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      cli_version: ${{ steps.ver.outputs.cli_version }}
      is_release: ${{ steps.ver.outputs.is_release }}
      checkout_ref: ${{ steps.ver.outputs.checkout_ref }}
      wheel_source: ${{ steps.ver.outputs.wheel_source }}
      wheel_release: ${{ steps.ver.outputs.wheel_release }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute version + wheel source
        id: ver
        run: |
          BASE_VERSION=$(grep '^version' cli/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # Resolve effective ref (workflow_run carries the real branch/tag
          # via head_branch; direct events use GITHUB_REF).
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            REF="refs/heads/${{ github.event.workflow_run.head_branch }}"
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            REF="$GITHUB_REF"
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$REF" == refs/tags/cli-v* ]]; then
            TAG_VERSION="${REF#refs/tags/cli-v}"
            if [[ "$TAG_VERSION" != "$BASE_VERSION" ]]; then
              echo "::error::Tag cli-v${TAG_VERSION} does not match cli/pyproject.toml version ${BASE_VERSION}"
              exit 1
            fi
            echo "cli_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "wheel_source=pypi" >> "$GITHUB_OUTPUT"
            echo "wheel_release=" >> "$GITHUB_OUTPUT"
          else
            echo "cli_version=${BASE_VERSION}.dev${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "wheel_source=internal" >> "$GITHUB_OUTPUT"
            LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 50 \
                --json tagName --jq '.[].tagName' \
              | grep '^dev-' | head -1 || true)
            if [[ -z "$LATEST" ]]; then
              # Bootstrap path: no aster-rpc dev release exists yet. The
              # native job is skipped; workflow_run from build.yml will
              # re-fire once dev-1 has been published.
              echo "::warning::No dev-* aster-rpc release found yet. Native job will skip; workflow_run from build.yml will re-fire."
            fi
            echo "wheel_release=${LATEST}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Show resolved values
        run: |
          echo "cli_version:   ${{ steps.ver.outputs.cli_version }}"
          echo "is_release:    ${{ steps.ver.outputs.is_release }}"
          echo "checkout_ref:  ${{ steps.ver.outputs.checkout_ref }}"
          echo "wheel_source:  ${{ steps.ver.outputs.wheel_source }}"
          echo "wheel_release: ${{ steps.ver.outputs.wheel_release }}"

  # ── Build sdist + wheel (pure-Python, single job) ─────────────────
  build:
    needs: [version]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.checkout_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Stamp version
        run: |
          sed -i 's/^version\s*=.*/version = "${{ needs.version.outputs.cli_version }}"/' cli/pyproject.toml
          grep '^version' cli/pyproject.toml
      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir dist cli/
      - name: List artifacts
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: aster-cli-dist
          path: dist

  # ── Native binaries (Nuitka onefile + standalone dist) ─────────────
  # Produces TWO artifacts per platform:
  #   1. Onefile binary `aster-<suffix>`  -- single file, ~2.8s first-run
  #      extraction cost, ~190ms thereafter. Distributed via curl|sh and winget.
  #   2. Standalone tarball `aster-dist-<suffix>.tar.gz` (zip on Windows) -- the
  #      unpacked dist directory. Always-fast startup. Distributed via Homebrew
  #      and any layout that wants a dist/ + symlink shape.
  #
  # Status: macOS (aarch64) only initially. Linux x86_64/aarch64 and Windows
  # x86_64 are planned -- see docs/_internal/cli_native_binaries/README.md.
  native:
    needs: [version]
    # Skip cleanly if no upstream aster-rpc wheel source resolved (pypi or
    # internal dev release). Bootstrap will resolve via workflow_run.
    if: ${{ needs.version.outputs.wheel_source == 'pypi' || needs.version.outputs.wheel_release != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, macOS, ARM64]
            suffix: macos-aarch64
            archive_ext: tar.gz
            binary_name: aster
            wheel_pattern: "*macosx*arm64*.whl"
    runs-on: ${{ matrix.runner }}
    env:
      NUITKA_CACHE_DIR: nuitka-cache
      ASTER_VERSION: ${{ needs.version.outputs.cli_version }}
      # setup-python@v5 hardcodes /Users/runner/hostedtoolcache on macOS;
      # our mac runner runs as `emrul`, not `runner`, so point the tool
      # cache at a user-writable path. .env on the runner already sets
      # this, but we also set it here so fresh runs work before the
      # runner service is restarted.
      AGENT_TOOLSDIRECTORY: /Users/emrul/hostedtoolcache
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.checkout_ref }}
      - uses: actions/setup-python@v5
        with:
          # 3.13 matches what's pre-cached on the self-hosted mac-arm runner.
          # setup-python hardcodes /Users/runner paths in its installer, so
          # falling back to download fails on runners that don't run as the
          # `runner` user. Stick to cached versions.
          python-version: "3.13"
      - name: Cache Nuitka C compilation
        uses: actions/cache@v4
        with:
          path: nuitka-cache
          key: nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cli/**', 'bindings/python/python/**') }}
          restore-keys: |
            nuitka-${{ runner.os }}-${{ runner.arch }}-
      - name: Stamp version
        # Keep `aster --version` in sync with the dev build tag. Nuitka reads
        # the installed package metadata, so stamp cli/pyproject.toml too
        # rather than relying on --product-version alone.
        run: sed -i '' 's/^version\s*=.*/version = "${{ needs.version.outputs.cli_version }}"/' cli/pyproject.toml
      - name: Install build tools
        run: pip install --upgrade pip nuitka ordered-set zstandard
      # ── Install aster-rpc (pyo3 wheel) from the right source ──────
      # We don't rebuild the pyo3 module from source -- that's what
      # build.yml already did. For dev flow, pull the matching mac-arm
      # wheel from the latest dev-<N> internal release. For tag flow,
      # use PyPI.
      - name: Install aster-rpc from internal dev release
        if: ${{ needs.version.outputs.wheel_source == 'internal' }}
        run: |
          mkdir -p wheels
          gh release download "${{ needs.version.outputs.wheel_release }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '${{ matrix.wheel_pattern }}' \
            --dir wheels
          ls -lh wheels/
          pip install --pre wheels/*.whl
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install aster-rpc from PyPI
        if: ${{ needs.version.outputs.wheel_source == 'pypi' }}
        run: pip install "aster-rpc==${{ needs.version.outputs.cli_version }}"
      - name: Install CLI (with deps so Nuitka auto-follows imports)
        # --pre allows the dev-stamped aster-rpc that's already installed
        # to satisfy the `aster-rpc>=0.2.0` dep without pip re-resolving
        # against PyPI.
        run: pip install --pre -e cli/
      # ── Onefile binary ─────────────────────────────────────────────
      # --onefile-no-compression: skip zstd -- ~190ms cached startup
      # --onefile-tempdir-spec: cache extraction at {CACHE_DIR}/aster_cli/{VERSION}
      #   so upgrades extract to a new path and the OS GCs the old one.
      # --product-version: required for {VERSION} substitution.
      - name: Build onefile binary
        run: >
          python -m nuitka
          --onefile
          --onefile-no-compression
          --onefile-tempdir-spec={CACHE_DIR}/aster_cli/{VERSION}
          --product-name=Aster
          --product-version=${{ env.ASTER_VERSION }}
          --output-filename=aster-${{ matrix.suffix }}${{ matrix.suffix == 'windows-x86_64' && '.exe' || '' }}
          --output-dir=dist-cli/
          --include-package=aster
          --include-package=aster_cli
          --include-package=pyfory
          --include-package-data=aster_cli
          --nofollow-import-to=pyfory.tests
          --nofollow-import-to=pytest
          --nofollow-import-to=numpy
          --nofollow-import-to=pyarrow
          --assume-yes-for-downloads
          cli/aster_entry.py
        shell: bash
      - name: Smoke test onefile
        run: dist-cli/aster-${{ matrix.suffix }}${{ matrix.suffix == 'windows-x86_64' && '.exe' || '' }} --version
        shell: bash
      # ── Standalone dist tarball ────────────────────────────────────
      # The onefile build keeps `aster_entry.dist/` by default. Rename
      # the inner binary to `aster` (or `aster.exe`) and tar/zip it.
      - name: Package standalone dist (unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mv dist-cli/aster_entry.dist/aster_entry.bin dist-cli/aster_entry.dist/aster
          mv dist-cli/aster_entry.dist aster-${{ matrix.suffix }}
          tar -czf dist-cli/aster-dist-${{ matrix.suffix }}.tar.gz aster-${{ matrix.suffix }}
        shell: bash
      - name: Package standalone dist (windows)
        if: matrix.archive_ext == 'zip'
        run: |
          Move-Item dist-cli\aster_entry.dist\aster_entry.exe dist-cli\aster_entry.dist\aster.exe
          Move-Item dist-cli\aster_entry.dist aster-${{ matrix.suffix }}
          Compress-Archive -Path aster-${{ matrix.suffix }} -DestinationPath dist-cli\aster-dist-${{ matrix.suffix }}.zip
        shell: pwsh
      # ── Upload both artifacts ──────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: cli-native-${{ matrix.suffix }}
          path: |
            dist-cli/aster-${{ matrix.suffix }}*
            dist-cli/aster-dist-${{ matrix.suffix }}.${{ matrix.archive_ext }}

  # ── Create GitHub Release (cli-v* tags only) ───────────────────────
  release:
    name: Create GitHub Release
    runs-on: [self-hosted, Linux, X64]
    if: startsWith(github.ref, 'refs/tags/cli-v')
    needs: [build, native, version]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aster-cli-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-native-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum aster-* > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: aster-cli ${{ needs.version.outputs.cli_version }}
          generate_release_notes: true
          files: dist/*

  # ── Publish to PyPI (cli-v* tags only, trusted publishing) ─────────
  pypi:
    name: Publish aster-cli to PyPI
    runs-on: [self-hosted, Linux, X64]
    if: startsWith(github.ref, 'refs/tags/cli-v')
    needs: [build, native, version]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aster-cli-dist
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Dev release (main pushes, keep last 2) ─────────────────────────
  # Publishes the Nuitka native binary + standalone dist + wheel/sdist to
  # the internal GH Releases page under tag `cli-dev-<run>`, marked as
  # prerelease so `cli-v*` stays the "Latest". Mirrors build.yml's
  # `dev-release` shape.
  dev-release:
    name: Publish CLI Dev Release
    runs-on: [self-hosted, Linux, X64]
    if: ${{ needs.version.outputs.is_release == 'false' }}
    needs: [build, native, version]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aster-cli-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-native-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum aster-* > SHA256SUMS
          cat SHA256SUMS
      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-dev-${{ github.run_number }}
          name: "aster-cli Dev Build #${{ github.run_number }} (${{ needs.version.outputs.cli_version }})"
          prerelease: true
          make_latest: false
          body: |
            Automated dev build from `main` at ${{ github.sha }}.

            **Version:** `${{ needs.version.outputs.cli_version }}`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Built platforms: **macOS (aarch64)** only. Other platforms will
            be wired up once the pipeline is proven out.

            ## Try it out (macOS ARM)
            ```bash
            gh release download cli-dev-${{ github.run_number }} \
              --repo ${{ github.repository }} \
              --pattern 'aster-macos-aarch64' \
              --dir /tmp/aster-cli
            chmod +x /tmp/aster-cli/aster-macos-aarch64
            /tmp/aster-cli/aster-macos-aarch64 --version
            ```
          files: dist/*
      - name: Prune old cli-dev releases (keep last 2)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(
              github.rest.repos.listReleases, { owner, repo }
            );
            const devReleases = releases
              .filter(r => r.tag_name.startsWith('cli-dev-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = devReleases.slice(2);
            for (const rel of toDelete) {
              console.log(`Deleting release ${rel.tag_name} (${rel.id})`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` });
              } catch (e) {
                console.log(`Tag ${rel.tag_name} already gone: ${e.message}`);
              }
            }
