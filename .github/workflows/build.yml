name: Build & Publish Wheels

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "!cli-v*"
    paths:
      - 'core/**'
      - 'ffi/**'
      - 'bindings/python/rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Compute version (build number for dev, clean for tags) ─────────
  version:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      python_version: ${{ steps.ver.outputs.python_version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute version
        id: ver
        run: |
          BASE_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "python_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_version=${BASE_VERSION}.dev${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Show version
        run: |
          echo "Version: ${{ steps.ver.outputs.python_version }}"
          echo "Release: ${{ steps.ver.outputs.is_release }}"

  # ── Linux (x86_64 + aarch64) ──────────────────────────────────────
  linux:
    needs: [version]
    strategy:
      matrix:
        include:
          - target: x86_64
            runner: [self-hosted, Linux, X64]
          - target: aarch64
            runner: [self-hosted, Linux, ARM64]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Fix ownership of stale Docker artifacts
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/target" || true
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Stamp version
        run: sed -i 's/^version.*=.*".*"/version = "${{ needs.version.outputs.python_version }}"/' pyproject.toml
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m bindings/python/rust/Cargo.toml
          manylinux: 2_28
      - name: Fix ownership of Docker-created files
        # `if: always()` is critical. maturin-action writes root-owned
        # files into target/ via its manylinux container. If the build
        # step fails partway, these files stay root-owned and poison
        # the next checkout on this runner (EACCES on CACHEDIR.TAG etc).
        # The chown must run even on build failure to leave a clean
        # runner workspace behind.
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" target/ dist/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── macOS (aarch64) ─────────────────────────────────────────────────
  macos:
    needs: [version]
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Stamp version
        run: sed -i '' 's/^version.*=.*".*"/version = "${{ needs.version.outputs.python_version }}"/' pyproject.toml
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m bindings/python/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  # ── Windows (x86_64) ──────────────────────────────────────────────
  windows:
    needs: [version]
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Stamp version
        run: (Get-Content pyproject.toml) -replace '^version\s*=\s*".*"', 'version = "${{ needs.version.outputs.python_version }}"' | Set-Content pyproject.toml
        shell: pwsh
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist -m bindings/python/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  # ── Source distribution ────────────────────────────────────────────
  sdist:
    needs: [version]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: sdist
      - name: Stamp version
        run: sed -i 's/^version.*=.*".*"/version = "${{ needs.version.outputs.python_version }}"/' pyproject.toml
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── Create GitHub Release (tags only) ───────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: [self-hosted, Linux, X64]
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist, version]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      # softprops/action-gh-release is self-contained and does not depend
      # on `gh` CLI being installed on the runner -- the self-hosted box
      # does not have gh, so `gh release create` fails with exit 127.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  # ── Publish to PyPI (tags only, trusted publishing) ────────────────
  pypi:
    name: Publish to PyPI
    runs-on: [self-hosted, Linux, X64]
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist, version]
    environment: pypi
    permissions:
      id-token: write
    steps:
      # `pattern: wheels-*` already pulls the sdist (uploaded as
      # `wheels-sdist` by the sdist job), so there is no separate
      # `sdist` artifact to download. Only one download step needed.
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Dev release (main pushes, keep last 2) ─────────────────────────
  dev-release:
    name: Publish Dev Release
    runs-on: [self-hosted, Linux, X64]
    if: ${{ needs.version.outputs.is_release == 'false' }}
    needs: [linux, macos, windows, sdist, version]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }} (${{ needs.version.outputs.python_version }})"
          prerelease: true
          make_latest: false
          body: |
            Automated dev build from `main` at ${{ github.sha }}.

            **Version:** `${{ needs.version.outputs.python_version }}`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ```bash
            gh release download dev-${{ github.run_number }} --repo ${{ github.repository }} --pattern '*.whl' --dir /tmp/wheels
            pip install /tmp/wheels/aster_rpc-*.whl
            ```
          files: dist/*
      - name: Prune old dev releases (keep last 2)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(
              github.rest.repos.listReleases, { owner, repo }
            );
            const devReleases = releases
              .filter(r => r.tag_name.startsWith('dev-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = devReleases.slice(2);
            for (const rel of toDelete) {
              console.log(`Deleting release ${rel.tag_name} (${rel.id})`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` });
              } catch (e) {
                console.log(`Tag ${rel.tag_name} already gone: ${e.message}`);
              }
            }
