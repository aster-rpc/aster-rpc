name: Build & Publish Wheels

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Compute version (build number for dev, clean for tags) ─────────
  version:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Linux, X64]
    outputs:
      python_version: ${{ steps.ver.outputs.python_version }}
      is_release: ${{ steps.ver.outputs.is_release }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if build-relevant files changed
        id: check
        run: |
          if [[ "${{ github.event_name }}" != "workflow_run" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- core/ ffi/ bindings/python/rust/ Cargo.toml Cargo.lock pyproject.toml .github/workflows/build.yml 2>/dev/null || echo "force")
            if [[ -n "$CHANGED" ]]; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "No build-relevant files changed, skipping"
            fi
          fi
      - name: Compute version
        id: ver
        run: |
          BASE_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "python_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_version=${BASE_VERSION}.dev${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Show version
        run: |
          echo "Version: ${{ steps.ver.outputs.python_version }}"
          echo "Release: ${{ steps.ver.outputs.is_release }}"

  # ── Linux (x86_64 + aarch64) ──────────────────────────────────────
  linux:
    needs: [version]
    if: needs.version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64
            runner: [self-hosted, Linux, X64]
          - target: aarch64
            runner: [self-hosted, Linux, ARM64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Stamp version
        run: sed -i 's/^version.*=.*".*"/version = "${{ needs.version.outputs.python_version }}"/' pyproject.toml
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m bindings/python/rust/Cargo.toml
          manylinux: 2_28
      - name: Fix ownership of Docker-created files
        run: sudo chown -R "$(id -u):$(id -g)" target/ dist/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── macOS (aarch64) ─────────────────────────────────────────────────
  macos:
    needs: [version]
    if: needs.version.outputs.should_build == 'true'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Stamp version
        run: sed -i '' 's/^version.*=.*".*"/version = "${{ needs.version.outputs.python_version }}"/' pyproject.toml
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m bindings/python/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  # ── Windows (x86_64) ──────────────────────────────────────────────
  windows:
    needs: [version]
    if: needs.version.outputs.should_build == 'true'
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Stamp version
        run: (Get-Content pyproject.toml) -replace '^version\s*=\s*".*"', 'version = "${{ needs.version.outputs.python_version }}"' | Set-Content pyproject.toml
        shell: pwsh
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist -m bindings/python/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  # ── Source distribution ────────────────────────────────────────────
  sdist:
    needs: [version]
    if: needs.version.outputs.should_build == 'true'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: sdist
      - name: Stamp version
        run: sed -i 's/^version.*=.*".*"/version = "${{ needs.version.outputs.python_version }}"/' pyproject.toml
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── Publish to GitHub Packages (main + tags) ───────────────────────
  publish-ghp:
    name: Publish to GitHub Packages
    runs-on: [self-hosted, Linux, X64]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist, version]
    permissions:
      packages: write
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install twine
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload \
            --repository-url https://ghp.pkg.github.com/${{ github.repository }} \
            dist/*
