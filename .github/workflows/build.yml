name: Build & Publish Wheels

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt #, clippy
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: lint
      - name: cargo fmt
        run: cargo fmt --manifest-path bindings/aster_python_rs/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path bindings/aster_python_rs/Cargo.toml -- -D warnings

  # ── Linux (x86_64 + aarch64) ──────────────────────────────────────
  linux:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: linux-${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/aster_python_rs/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── macOS (x86_64 + aarch64) ──────────────────────────────────────
  macos:
    needs: lint
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: macos-${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/aster_python_rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  # ── Windows (x86_64) ──────────────────────────────────────────────
  windows:
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: windows-x64
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist -m bindings/aster_python_rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  # ── Source distribution ────────────────────────────────────────────
  sdist:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: sdist
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/aster_python_rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── Publish to PyPI (only on tag push) ─────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist]
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1