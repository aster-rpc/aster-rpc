name: Mobile Builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── iOS (xcframework from self-hosted Mac) ─────────────────────────
  ios:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios
      - name: Build iOS device (arm64)
        run: cargo build --release -p aster_transport_ffi --target aarch64-apple-ios
      - name: Build iOS simulator (arm64)
        run: cargo build --release -p aster_transport_ffi --target aarch64-apple-ios-sim
      - name: Build iOS simulator (x86_64)
        run: cargo build --release -p aster_transport_ffi --target x86_64-apple-ios
      - name: Create simulator fat library
        run: |
          mkdir -p target/ios-sim-fat
          lipo -create \
            target/aarch64-apple-ios-sim/release/libaster_transport_ffi.a \
            target/x86_64-apple-ios/release/libaster_transport_ffi.a \
            -output target/ios-sim-fat/libaster_transport_ffi.a
      - name: Create xcframework
        run: |
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libaster_transport_ffi.a \
            -library target/ios-sim-fat/libaster_transport_ffi.a \
            -output AsterTransport.xcframework
      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: AsterTransport.xcframework

  # ── Android (.so via cargo-ndk from self-hosted Linux ARM) ─────────
  android:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Build Android libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86_64 \
            -t x86 \
            build --release -p aster_transport_ffi
      - name: Package .so files
        run: |
          mkdir -p android-libs/{arm64-v8a,armeabi-v7a,x86_64,x86}
          cp target/aarch64-linux-android/release/libaster_transport_ffi.so android-libs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libaster_transport_ffi.so android-libs/armeabi-v7a/
          cp target/x86_64-linux-android/release/libaster_transport_ffi.so android-libs/x86_64/
          cp target/i686-linux-android/release/libaster_transport_ffi.so android-libs/x86/
      - uses: actions/upload-artifact@v4
        with:
          name: android-libs
          path: android-libs
