name: Runner Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3 AM UTC
  workflow_dispatch:

jobs:
  # ── Linux x64 (dockerized) ──────────────────────────────────────────
  linux-x64:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Clean build artifacts
        run: |
          echo "=== Before cleanup ==="
          df -h . || true
          for dir in "$GITHUB_WORKSPACE" "$HOME/actions-runner/_work"; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 3 -name target -type d 2>/dev/null | while read -r t; do
              rm -rf "$t/debug" "$t/release/incremental" "$t/release/build" "$t/release/.fingerprint"
            done
            find "$dir" -maxdepth 3 -name dist -type d -exec rm -rf {} + 2>/dev/null || true
          done
      - name: Clean Docker
        run: |
          docker system prune -f --filter "until=168h" 2>/dev/null || true
          docker builder prune -f --filter "until=168h" 2>/dev/null || true
      - name: Clean package caches
        run: |
          rm -rf ~/.cache/pip 2>/dev/null || true
          rm -rf ~/.npm/_cacache 2>/dev/null || true
      - name: Report
        run: |
          echo "=== After cleanup ==="
          df -h . || true

  # ── Linux ARM64 ─────────────────────────────────────────────────────
  linux-arm64:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Clean build artifacts
        run: |
          echo "=== Before cleanup ==="
          df -h . || true
          for dir in "$GITHUB_WORKSPACE" "$HOME/actions-runner/_work"; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 3 -name target -type d 2>/dev/null | while read -r t; do
              rm -rf "$t/debug" "$t/release/incremental" "$t/release/build" "$t/release/.fingerprint"
            done
            find "$dir" -maxdepth 3 -name dist -type d -exec rm -rf {} + 2>/dev/null || true
          done
      - name: Clean Docker
        run: |
          docker system prune -f --filter "until=168h" 2>/dev/null || true
          docker builder prune -f --filter "until=168h" 2>/dev/null || true
      - name: Clean package caches
        run: |
          rm -rf ~/.cache/pip 2>/dev/null || true
          rm -rf ~/.npm/_cacache 2>/dev/null || true
      - name: Report
        run: |
          echo "=== After cleanup ==="
          df -h . || true

  # ── macOS ARM64 ─────────────────────────────────────────────────────
  macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Clean build artifacts
        run: |
          echo "=== Before cleanup ==="
          df -h . || true
          for dir in "$GITHUB_WORKSPACE" /Users/emrul/dev/aster/local_mac_runner/_work; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 3 -name target -type d 2>/dev/null | while read -r t; do
              rm -rf "$t/debug" "$t/release/incremental" "$t/release/build" "$t/release/.fingerprint"
            done
            find "$dir" -maxdepth 3 -name dist -type d -exec rm -rf {} + 2>/dev/null || true
          done
      - name: Clean package caches
        run: |
          rm -rf ~/Library/Caches/pip 2>/dev/null || true
          rm -rf ~/.npm/_cacache 2>/dev/null || true
      - name: Report
        run: |
          echo "=== After cleanup ==="
          df -h . || true

  # ── Windows x64 ─────────────────────────────────────────────────────
  windows:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Clean build artifacts
        shell: pwsh
        run: |
          Write-Host "=== Before cleanup ==="
          Get-PSDrive C | Select-Object Used, Free | Format-Table
          $searchPaths = @($env:GITHUB_WORKSPACE, "C:\actions-runner\_work")
          foreach ($base in $searchPaths) {
            if (-not (Test-Path $base)) { continue }
            Get-ChildItem -Path $base -Recurse -Depth 2 -Directory -Filter "target" -ErrorAction SilentlyContinue | ForEach-Object {
              $t = $_.FullName
              Remove-Item -Recurse -Force "$t\debug" -ErrorAction SilentlyContinue
              Remove-Item -Recurse -Force "$t\release\incremental" -ErrorAction SilentlyContinue
              Remove-Item -Recurse -Force "$t\release\build" -ErrorAction SilentlyContinue
              Remove-Item -Recurse -Force "$t\release\.fingerprint" -ErrorAction SilentlyContinue
            }
            Get-ChildItem -Path $base -Recurse -Depth 2 -Directory -Filter "dist" -ErrorAction SilentlyContinue |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
      - name: Clean package caches
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA\pip\Cache" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:APPDATA\npm-cache\_cacache" -ErrorAction SilentlyContinue
      - name: Report
        shell: pwsh
        run: |
          Write-Host "=== After cleanup ==="
          Get-PSDrive C | Select-Object Used, Free | Format-Table
