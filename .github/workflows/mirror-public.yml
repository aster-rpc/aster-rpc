name: Mirror to public repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Do NOT install the scoped GITHUB_TOKEN as an http.extraheader
          # on github.com requests. That header overrides URL-embedded
          # credentials on every git push, so the PUBLIC_REPO_TOKEN we
          # embed into the `public` remote URL would be ignored and git
          # would fall back to github-actions[bot] (403 on the target).
          persist-credentials: false

      - name: Filter internal files
        run: |
          # Remove files listed in .publicignore
          while IFS= read -r pattern; do
            [[ "$pattern" =~ ^#.*$ || -z "$pattern" ]] && continue
            pattern=$(echo "$pattern" | xargs)
            [ -z "$pattern" ] && continue
            rm -rf $pattern 2>/dev/null || true
          done < .publicignore

          # Remove the mirror config itself
          rm -f .publicignore
          rm -f .github/workflows/mirror-public.yml

          # Clean up empty directories
          find . -type d -empty -delete 2>/dev/null || true

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git config user.name "Emrul Islam"
          git config user.email "emrul@aster.dev"
          # Mirror commits are plumbing, not authored work. Disable signing
          # so a runner-side key expiry can't take down the mirror pipeline.
          git config commit.gpgsign false
          git config tag.gpgsign false

          # Stage filtered state
          git add -A
          git commit -m "Mirror from private repo" --allow-empty || true

          # Push to public repo.
          #
          # Self-hosted runners retain the .git directory between runs, so
          # the `public` remote from a prior run is still configured with
          # whatever (possibly empty) token value was in scope then. Always
          # reset the URL so the CURRENT PUBLIC_REPO_TOKEN is what's used.
          if [ -z "${PUBLIC_REPO_TOKEN:-}" ]; then
            echo "::error::PUBLIC_REPO_TOKEN secret is empty or missing."
            exit 1
          fi
          PUBLIC_URL="https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/aster-rpc/aster-rpc.git"
          if git remote get-url public >/dev/null 2>&1; then
            git remote set-url public "${PUBLIC_URL}"
          else
            git remote add public "${PUBLIC_URL}"
          fi
          # Override any leftover credential helper from actions/checkout so
          # it can't fall back to GITHUB_TOKEN (which is scoped to the source
          # repo only and will 403 on the target org repo).
          git -c credential.helper= push public main --force
