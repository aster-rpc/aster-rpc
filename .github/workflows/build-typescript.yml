name: Build & Publish TypeScript

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'core/**'
      - 'bindings/typescript/**'
      - '.github/workflows/build-typescript.yml'
  workflow_dispatch:

concurrency:
  group: build-ts-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"
  NODE_VERSION: "20"

jobs:
  # ── Compute version (build number for dev, clean for tags) ─────────
  version:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute version
        id: ver
        run: |
          BASE=$(node -e "console.log(require('./bindings/typescript/native/package.json').version)")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            # Dev builds use the package.json base version with a build suffix.
            # Pre-release identifiers (alpha/beta/rc) are preserved.
            echo "version=${BASE}-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Show version
        run: |
          echo "Version: ${{ steps.ver.outputs.version }}"
          echo "Release: ${{ steps.ver.outputs.is_release }}"

  # ── Build native binary per platform ────────────────────────────────
  build-native:
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runner: [self-hosted, Linux, X64]
            cross: false
          - platform: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            runner: [self-hosted, Linux, ARM64]
            cross: false
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            runner: [self-hosted, macOS, ARM64]
            cross: false
          - platform: darwin-x64
            target: x86_64-apple-darwin
            runner: [self-hosted, macOS, ARM64]
            cross: true            # cross-compile from arm64 mac
          - platform: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runner: [self-hosted, Windows, X64]
            cross: false
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: bindings/typescript/native
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm deps
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Stamp version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.version.outputs.version }}';
            if (pkg.optionalDependencies) {
              for (const k of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[k] = '${{ needs.version.outputs.version }}';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build native binary
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Stage into platform package dir
        shell: bash
        run: |
          # Recreate the npm/<platform>/ dirs from package.json metadata
          npx napi create-npm-dirs
          # Copy the built .node into npm/<platform>/
          npx napi artifacts --output-dir . --npm-dir ./npm
          # Stamp version on the platform package too
          node -e "
            const fs = require('fs');
            const path = 'npm/${{ matrix.platform }}/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ needs.version.outputs.version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "
          ls -la npm/${{ matrix.platform }}/

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: bindings/typescript/native/npm/${{ matrix.platform }}/
          if-no-files-found: error

  # ── Build the main @aster-rpc/transport package (loader + metadata) ─
  build-transport:
    needs: [version]
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: bindings/typescript/native
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Stamp version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.version.outputs.version }}';
            if (pkg.optionalDependencies) {
              for (const k of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[k] = '${{ needs.version.outputs.version }}';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Stage tarball contents
        shell: bash
        run: |
          mkdir -p ../../../dist-transport
          cp package.json index.js index.d.ts ../../../dist-transport/
          # README is optional but worth including if present
          [ -f README.md ] && cp README.md ../../../dist-transport/ || true
          ls -la ../../../dist-transport/
      - name: Upload transport package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-transport
          path: dist-transport/
          if-no-files-found: error

  # ── Build @aster-rpc/aster (TypeScript-only, no native code) ────────
  build-aster:
    needs: [version]
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: bindings/typescript/packages/aster
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install npm deps
        run: npm install --no-audit --no-fund --ignore-scripts
      - name: Stamp version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.version.outputs.version }}';
            // Pin transport to the exact same version we're publishing.
            if (pkg.dependencies && pkg.dependencies['@aster-rpc/transport']) {
              pkg.dependencies['@aster-rpc/transport'] = '${{ needs.version.outputs.version }}';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Build TypeScript
        run: npm run build
      - name: Stage tarball contents
        shell: bash
        run: |
          mkdir -p ../../../../dist-aster
          cp package.json ../../../../dist-aster/
          cp -r dist ../../../../dist-aster/
          [ -f README.md ] && cp README.md ../../../../dist-aster/ || true
          [ -f LICENSE ] && cp LICENSE ../../../../dist-aster/ || true
          ls -la ../../../../dist-aster/
      - name: Upload aster package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-aster
          path: dist-aster/
          if-no-files-found: error

  # ── Publish to npm (tags only) ───────────────────────────────────────
  publish:
    name: Publish to npm
    needs: [version, build-native, build-transport, build-aster]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, Linux, X64]
    environment: npm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Compute npm dist-tag
        id: tag
        run: |
          # alpha/beta/rc versions get a corresponding dist-tag so they
          # don't become the default `npm install` target. Stable versions
          # publish as `latest`.
          VERSION="${{ needs.version.outputs.version }}"
          if [[ "$VERSION" == *-alpha* ]]; then
            echo "dist_tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-beta* ]]; then
            echo "dist_tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-rc* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: npm-*

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in artifacts/npm-linux-x64-gnu artifacts/npm-linux-arm64-gnu artifacts/npm-darwin-arm64 artifacts/npm-darwin-x64 artifacts/npm-win32-x64-msvc; do
            echo "─── Publishing $dir ───"
            (cd "$dir" && npm publish --access public --tag ${{ steps.tag.outputs.dist_tag }})
          done

      - name: Publish @aster-rpc/transport (loader)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd artifacts/npm-transport
          npm publish --access public --tag ${{ steps.tag.outputs.dist_tag }}

      - name: Publish @aster-rpc/aster
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd artifacts/npm-aster
          npm publish --access public --tag ${{ steps.tag.outputs.dist_tag }}
