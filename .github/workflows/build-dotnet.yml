name: Build & Publish .NET

# .NET binding packaging. The native lib `libaster_transport_ffi` is NOT
# built here -- it's the shared C-ABI artifact owned by build-ffi.yml.
# This workflow downloads the prebuilt natives (from the internal
# `ffi-dev-<N>` prerelease for main, or the public `v*` release for tags)
# and packs them into the NuGet runtimes layout.
#
# Triggers:
#   - push to main on bindings/dotnet/** or this file: rebuild NuGet pkg
#     using whatever ffi-dev-<N> is currently published.
#   - push of v* tag: build using natives attached to that tag's release.
#   - workflow_run after Build & Publish FFI completes successfully:
#     rebuild NuGet pkg with the just-published natives.
#   - workflow_dispatch.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'bindings/dotnet/**'
      - '.github/workflows/build-dotnet.yml'
  workflow_run:
    workflows: ["Build & Publish FFI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: build-dotnet-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  # ── Compute version ─────────────────────────────────────────────────
  # When triggered via workflow_run, github.ref is the default branch.
  # Resolve the original ref from the workflow_run payload so tag-driven
  # ffi builds still produce tag-numbered .NET packages.
  version:
    runs-on: [self-hosted, Linux, X64]
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
      checkout_ref: ${{ steps.ver.outputs.checkout_ref }}
      ffi_release: ${{ steps.ver.outputs.ffi_release }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute version + ffi source
        id: ver
        run: |
          BASE="0.2.0"
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            REF="${{ github.event.workflow_run.head_branch }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            echo "checkout_ref=${SHA}" >> "$GITHUB_OUTPUT"
          else
            REF="${GITHUB_REF#refs/*/}"
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$REF" == v* ]]; then
            # Tag-driven build: version from tag, fetch FFI from same v* release.
            echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "ffi_release=${REF}" >> "$GITHUB_OUTPUT"
          else
            # Main-driven build: dev version, fetch FFI from latest ffi-dev-* prerelease.
            echo "version=${BASE}-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 50 \
                --json tagName --jq '.[].tagName' \
              | grep '^ffi-dev-' | head -1 || true)
            if [[ -z "$LATEST" ]]; then
              # Bootstrap path: no ffi-dev exists yet (e.g. this is the
              # first push after introducing build-ffi.yml). Skip cleanly
              # -- the workflow_run trigger from build-ffi will re-fire
              # this workflow once ffi-dev-1 has been published.
              echo "::warning::No ffi-dev-* release found yet. Skipping; workflow_run from build-ffi will re-fire this."
            fi
            echo "ffi_release=${LATEST}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Show resolved values
        run: |
          echo "version:      ${{ steps.ver.outputs.version }}"
          echo "is_release:   ${{ steps.ver.outputs.is_release }}"
          echo "checkout_ref: ${{ steps.ver.outputs.checkout_ref }}"
          echo "ffi_release:  ${{ steps.ver.outputs.ffi_release }}"

  # ── Fetch prebuilt FFI natives + pack NuGet ────────────────────────
  pack:
    needs: [version]
    if: ${{ needs.version.outputs.ffi_release != '' }}
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.checkout_ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download FFI natives from ${{ needs.version.outputs.ffi_release }}
        run: |
          mkdir -p ffi-tarballs
          gh release download "${{ needs.version.outputs.ffi_release }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'libaster_transport_ffi-*.tar.gz' \
            --dir ffi-tarballs
          ls -lh ffi-tarballs/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Stage natives into runtimes layout
        run: |
          # Each tarball is libaster_transport_ffi-<rid>.tar.gz containing
          # the bare .so/.dylib/.dll. Extract one per RID into the NuGet
          # `runtimes/<rid>/native/` convention.
          for tar in ffi-tarballs/libaster_transport_ffi-*.tar.gz; do
            base=$(basename "$tar" .tar.gz)
            rid="${base#libaster_transport_ffi-}"
            mkdir -p "bindings/dotnet/src/Aster/runtimes/$rid/native"
            tar -xzf "$tar" -C "bindings/dotnet/src/Aster/runtimes/$rid/native/"
          done
          find bindings/dotnet/src/Aster/runtimes -type f | sort

      - name: Build and pack
        working-directory: bindings/dotnet
        run: |
          dotnet build src/Aster/Aster.csproj -c Release \
            /p:Version=${{ needs.version.outputs.version }}
          dotnet pack src/Aster/Aster.csproj -c Release --no-build \
            /p:Version=${{ needs.version.outputs.version }} \
            -o ./dist

      - name: List packages
        run: ls -lh bindings/dotnet/dist/

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-nupkg
          path: bindings/dotnet/dist/*.nupkg

  # ── Publish dev to GitHub Packages (main pushes) ────────────────────
  publish-dev:
    name: Publish dev to GitHub Packages
    needs: [version, pack]
    if: ${{ needs.version.outputs.is_release == 'false' }}
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: dotnet-nupkg
          path: dist
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push dist/*.nupkg \
            --source "https://nuget.pkg.github.com/aster-rpc/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
