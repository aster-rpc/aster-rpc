name: CI (TypeScript)

on:
  push:
    branches: [main]
    paths:
      - 'bindings/typescript/**'
      - 'core/**'
      - 'conformance/**'
      - '.github/workflows/ci-typescript.yml'
  pull_request:
    paths:
      - 'bindings/typescript/**'
      - 'core/**'
      - 'conformance/**'
      - '.github/workflows/ci-typescript.yml'
  workflow_dispatch:

concurrency:
  group: ci-ts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Rust lint (NAPI-RS crate) ──────────────────────────────────────
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - name: cargo fmt (NAPI)
        run: cargo fmt -p aster-transport-napi --check
      - name: cargo clippy (NAPI)
        run: cargo clippy -p aster-transport-napi -- -D warnings

  # ── TypeScript: typecheck + unit tests ─────────────────────────────
  # Matrix covers the two platforms we actually ship: Linux x64 and
  # macOS ARM64 (Mac Intel dropped in build-typescript's cross target).
  # Node matrix trimmed to 22 (current LTS); 20 is maintenance-only as
  # of April 2026.
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runs-on: [self-hosted, Linux, X64]
            node: 22
          - label: macos-arm64
            runs-on: [self-hosted, macOS, ARM64]
            node: 22
    runs-on: ${{ matrix.runs-on }}
    name: test (${{ matrix.label }}, node-${{ matrix.node }})
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        working-directory: bindings/typescript
        run: bun install

      - name: Build NAPI binding (.node)
        # Tests load `@aster-rpc/transport` which dispatches to a local
        # `aster-transport.<platform>.node` next to native/index.js. Without
        # this step the loader falls through to the published platform
        # package, which doesn't exist in CI and breaks aster-gen tests.
        working-directory: bindings/typescript/native
        run: bun run build

      - name: Typecheck
        working-directory: bindings/typescript/packages/aster
        run: npx tsc --noEmit

      - name: Build (required for aster-gen scanner tests)
        # tests/typescript/unit/aster-gen.test.ts invokes the compiled
        # dist/cli/gen.js; `tsc --noEmit` above doesn't emit it, so we
        # run the real build here before vitest.
        working-directory: bindings/typescript/packages/aster
        run: bun run build

      - name: Run tests (bun + vitest)
        working-directory: bindings/typescript/packages/aster
        run: bun run test

      - name: Validate conformance vectors
        working-directory: bindings/typescript/packages/aster
        run: bun run vitest run ../../../../tests/typescript/unit/framing.test.ts

  # ── NAPI-RS: cargo check ───────────────────────────────────────────
  napi-check:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runs-on: [self-hosted, Linux, X64]
          - label: macos-arm64
            runs-on: [self-hosted, macOS, ARM64]
    runs-on: ${{ matrix.runs-on }}
    name: napi-check (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: cargo check (NAPI crate)
        run: cargo check -p aster-transport-napi
