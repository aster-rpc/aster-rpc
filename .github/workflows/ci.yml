name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt #, clippy
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: lint
      - name: cargo fmt
        run: cargo fmt --manifest-path bindings/aster_python_rs/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path bindings/aster_python_rs/Cargo.toml -- -D warnings

  # ── Build + Test matrix ────────────────────────────────────────────
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: test-${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build and test (unix)
        if: runner.os != 'Windows'
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout maturin

          echo "=== Environment parity diagnostics ==="
          uv --version
          python -VV
          uv pip freeze | grep -E '^(pyfory|zstandard|blake3|pytest|pytest-asyncio|pytest-timeout|maturin|cython|Cython)==' || true
          python - <<'PY'
          import importlib
          import platform
          import sys

          print("python:", sys.version.replace("\n", " "))
          print("platform:", platform.platform())

          import pyfory
          print("pyfory:", getattr(pyfory, "__version__", "unknown"))
          print("pyfory.__file__:", pyfory.__file__)

          try:
              mod = importlib.import_module("pyfory.includes.libformat")
              print("pyfory.includes.libformat:", getattr(mod, "__file__", "<built-in>"))
              print("has CTypeId:", hasattr(mod, "CTypeId"))
          except Exception as exc:
              print("import pyfory.includes.libformat failed:", repr(exc))
          PY

          maturin develop -m bindings/aster_python_rs/Cargo.toml
          pytest tests/python/ -v --timeout=60
        shell: bash

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: |
          uv venv .venv
          .venv\Scripts\activate
          uv pip install pytest pytest-asyncio pytest-timeout maturin

          Write-Host "=== Environment parity diagnostics ==="
          uv --version
          python -VV
          uv pip freeze | Select-String -Pattern '^(pyfory|zstandard|blake3|pytest|pytest-asyncio|pytest-timeout|maturin|cython|Cython)=='
          python -c "import importlib,platform,sys,pyfory; print('python:', sys.version.replace('\n',' ')); print('platform:', platform.platform()); print('pyfory:', getattr(pyfory,'__version__','unknown')); print('pyfory.__file__:', pyfory.__file__); mod = importlib.import_module('pyfory.includes.libformat'); print('pyfory.includes.libformat:', getattr(mod,'__file__','<built-in>')); print('has CTypeId:', hasattr(mod,'CTypeId'))"

          maturin develop -m bindings/aster_python_rs/Cargo.toml
          pytest tests/python/ -v --timeout=60
        shell: pwsh
