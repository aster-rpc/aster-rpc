name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt #, clippy
      - name: cargo fmt
        run: cargo fmt --manifest-path iroh_python_rs/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path iroh_python_rs/Cargo.toml -- -D warnings

  # ── Build + Test matrix ────────────────────────────────────────────
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies and build extension (unix)
        if: runner.os != 'Windows'
        run: |
          uv pip install --system pytest pytest-asyncio pytest-timeout maturin
          uv maturin develop -m iroh_python_rs/Cargo.toml
        shell: bash

      - name: Install dependencies and build extension (Windows)
        if: runner.os == 'Windows'
        run: |
          uv pip install --system pytest pytest-asyncio pytest-timeout maturin
          uv maturin develop -m iroh_python_rs/Cargo.toml
        shell: bash

      - name: Run tests
        run: uv pytest tests/ -v --timeout=60
