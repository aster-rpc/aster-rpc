name: CI

on:
  push:
    branches: [main]
    # Allow-list, not block-list. The previous `paths-ignore` form
    # didn't exclude `.github/**`, which meant every workflow-file tweak
    # (mirror filter, build-cli script, build-typescript script, etc.)
    # spun up the entire Rust + Python test matrix on the self-hosted
    # runners for ~20 minutes. Now CI only fires when a path it
    # actually tests changes.
    #
    # Notably absent and intentional:
    #   - bindings/typescript/**  (covered by ci-typescript.yml)
    #   - bindings/{java,go,dotnet}/**  (no CI coverage yet)
    #   - docs/**, *.md, scripts/**, ffi_spec/**  (no code)
    #   - .github/workflows/{build*,mirror*,ci-typescript}.yml
    #     (each has its own trigger or doesn't need CI)
    paths:
      - 'core/**'
      - 'ffi/**'
      - 'bindings/python/**'
      - 'cli/**'
      - 'tests/python/**'
      - 'tests/integration/**'
      - 'conformance/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'ffi/**'
      - 'bindings/python/**'
      - 'cli/**'
      - 'tests/python/**'
      - 'tests/integration/**'
      - 'conformance/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Rust lint (self-hosted, fast with cached deps) ─────────────────
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - name: aster-cli ↔ aster-rpc version compat
        run: python3 scripts/check-cli-compat.py
      - name: cargo fmt
        run: cargo fmt --manifest-path bindings/python/rust/Cargo.toml --check
      - name: cargo clippy (bindings)
        run: cargo clippy --manifest-path bindings/python/rust/Cargo.toml -- -D warnings
      - name: cargo clippy (core)
        run: cargo clippy -p aster_transport_core -- -D warnings
      - name: cargo clippy (ffi)
        run: cargo clippy -p aster_transport_ffi -- -D warnings

  # ── Detect what changed (used by gating tests) ────────────────────
  changes:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    outputs:
      iroh: ${{ steps.filter.outputs.iroh }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iroh:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'core/**'
              - 'bindings/python/rust/**'
              - 'tests/python/test_blobs.py'
              - 'tests/python/test_docs.py'
              - 'tests/python/test_gossip.py'
              - 'tests/python/test_dumbpipe.py'
              - 'tests/python/test_net.py'
              - 'tests/python/test_node.py'
              - 'tests/python/test_phase1b.py'
              - '.github/workflows/ci.yml'

  # ── Python bindings: framework tests (fast, no iroh primitives) ────
  # Runs on every push. Excludes iroh-primitive tests (blobs/docs/gossip/
  # dumbpipe/net/node/phase1b) which are gated on iroh dep changes.
  test-unit:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build and run framework tests
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout maturin
          uv pip install "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop --release -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ tests/chaos/ -v --timeout=30 \
            -m "not network and not iroh_primitives"
        shell: bash

  # ── Iroh primitive tests: only when iroh deps or Rust binding change ─
  # These exercise blobs, docs, gossip, dumbpipe, raw QUIC -- the upstream
  # iroh features we wrap but don't develop. Slow (~5 min) and rarely
  # affected by RPC framework or CLI changes.
  test-iroh-primitives:
    needs: [lint, changes]
    if: needs.changes.outputs.iroh == 'true'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build and run iroh primitive tests
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop --release -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ -v --timeout=60 --reruns=2 --reruns-delay=2 \
            -m "iroh_primitives"
        shell: bash

  # ── Python bindings: cross-platform full test matrix ───────────────
  # Runs on PRs and main pushes. Excludes iroh primitives (covered by
  # test-iroh-primitives when iroh deps change). Includes the framework
  # tests + all the auth/admission/e2e/integration tests on every platform.
  test-full:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            label: linux-x64
            shell: bash
          - runner: [self-hosted, Linux, ARM64]
            label: linux-arm64
            shell: bash
          - runner: [self-hosted, macOS, ARM64]
            label: macos-arm64
            shell: bash
          - runner: [self-hosted, Windows, X64]
            label: windows-x64
            shell: pwsh
    runs-on: ${{ matrix.runner }}
    name: test-full (${{ matrix.label }})
    steps:
      # build.yml's linux job runs maturin-action inside a manylinux2_28
      # container which executes as root and writes root-owned files into
      # target/. If that job (or any prior self-hosted Linux job that used
      # a rootful container) leaves stale files in the shared runner
      # workspace, actions/checkout can't `rm -rf` them and the job dies
      # with EACCES. Mirror build.yml's pre-checkout sudo cleanup.
      - name: Fix ownership of stale Docker artifacts
        if: runner.os == 'Linux'
        run: sudo rm -rf "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/target" || true
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        if: runner.os == 'Linux'
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build and test (unix)
        if: matrix.shell == 'bash'
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop --release -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ tests/chaos/ -v --timeout=60 --reruns=2 --reruns-delay=2 \
            -m "not iroh_primitives"
        shell: bash

      - name: Build and test (Windows)
        if: matrix.shell == 'pwsh'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          uv venv .venv
          .venv\Scripts\activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop --release -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ tests/chaos/ -v --timeout=60 --reruns=2 --reruns-delay=2 -m "not iroh_primitives"
        shell: pwsh

  # ── Rust core tests (no Python dependency) ─────────────────────────
  test-rust:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: cargo test (core)
        run: cargo test -p aster_transport_core
      - name: cargo test (ffi)
        run: cargo test -p aster_transport_ffi

  # ── Rust sanitizers (ASan + LSan + TSan) ──────────────────────────
  # `-Z sanitizer=*` is a nightly-only rustc flag. We pin to a specific
  # nightly rather than tracking latest: vergen-lib (transitive via
  # iroh-relay) uses rustversion for nightly detection, which has
  # repeatedly broken on bleeding-edge nightly releases (both nightly()
  # cfg-gated functions get emitted, causing E0428). A pinned nightly
  # keeps this deterministic.
  #
  # `continue-on-error: true` makes sanitizer failures non-blocking
  # for merges -- the signal is still visible in the UI but future
  # nightly/rustversion drift won't gate the dev pipeline. Upgrade
  # the pin deliberately when revisiting.
  test-rust-sanitize:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, leak, thread]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-10-15
      - name: Run ${{ matrix.sanitizer }} sanitizer tests
        env:
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
        # Explicit per-binary invocations so we can skip cq_concurrency_loom
        # (loom::model holds per-iteration state that LSan false-positives as
        # a leak; see the comment at the top of the test file). Auto-discovery
        # over ffi/tests/*.rs keeps this maintenance-free as new tests land.
        run: |
          cargo test -p aster_transport_ffi --lib
          for t in $(ls ffi/tests/*.rs 2>/dev/null | xargs -n1 basename | sed 's/\.rs$//'); do
            [ "$t" = "cq_concurrency_loom" ] && continue
            cargo test -p aster_transport_ffi --test "$t"
          done

  # ── Miri (interpreter for unsafe code validation) ─────────────────
  test-rust-miri:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri
      - name: Install miri
        run: cargo miri setup
      - name: cargo miri test (ffi lib)
        run: cargo miri test -p aster_transport_ffi --lib
      - name: cargo miri test (ffi integration tests)
        run: cargo miri test -p aster_transport_ffi --test cq_state_machine
      # Loom tests are excluded from miri (loom uses its own runtime)

  # ── API docs generation ──────────────────────────────────────────
  docs:
    needs: test-unit
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build and generate docs
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin pdoc
          uv pip install "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop --release -m bindings/python/rust/Cargo.toml
          uv run pdoc --no-include-undocumented -o docs/python aster.public
        shell: bash
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs-python
          path: docs/python/

  # ════════════════════════════════════════════════════════════════════
  # Future language bindings go here. Each binding gets:
  #   1. A lint job (or extend the lint job above)
  #   2. A test job on relevant platforms
