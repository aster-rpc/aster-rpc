name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # ── Rust lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt #, clippy
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: lint
      - name: Cache diagnostics (pre-lint)
        run: |
          echo "RUSTC_WRAPPER=${RUSTC_WRAPPER}"
          echo "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED}"
          sccache --version
          sccache --show-stats || true
      - name: cargo fmt
        run: cargo fmt --manifest-path bindings/aster_python_rs/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path bindings/aster_python_rs/Cargo.toml -- -D warnings
      - name: Cache diagnostics (post-lint)
        run: sccache --show-stats || true

  # ── Build + Test matrix ────────────────────────────────────────────
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: test-${{ matrix.target }}
      - name: Cache diagnostics (pre-build)
        if: runner.os != 'Windows'
        run: |
          echo "RUSTC_WRAPPER=${RUSTC_WRAPPER}"
          echo "SCCACHE_GHA_ENABLED=${SCCACHE_GHA_ENABLED}"
          rustc -Vv
          sccache --version
          sccache --show-stats || true
        shell: bash
      - name: Cache diagnostics (pre-build, Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "RUSTC_WRAPPER=$env:RUSTC_WRAPPER"
          Write-Host "SCCACHE_GHA_ENABLED=$env:SCCACHE_GHA_ENABLED"
          rustc -Vv
          sccache --version
          sccache --show-stats
        shell: pwsh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build and test (unix)
        if: runner.os != 'Windows'
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout maturin
          maturin develop -m bindings/aster_python_rs/Cargo.toml
          pytest tests/ -v --timeout=60
        shell: bash

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: |
          uv venv .venv
          .venv\Scripts\activate
          uv pip install pytest pytest-asyncio pytest-timeout maturin
          maturin develop -m bindings/aster_python_rs/Cargo.toml
          pytest tests/ -v --timeout=60
        shell: pwsh
      - name: Cache diagnostics (post-build)
        if: runner.os != 'Windows'
        run: sccache --show-stats || true
        shell: bash
      - name: Cache diagnostics (post-build, Windows)
        if: runner.os == 'Windows'
        run: sccache --show-stats
        shell: pwsh
