name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'scripts/**'
      - 'ffi_spec/**'
      - '*.md'
      - 'README.md'
      - 'LICENSE*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'scripts/**'
      - 'ffi_spec/**'
      - '*.md'
      - 'README.md'
      - 'LICENSE*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Rust lint (self-hosted, fast with cached deps) ─────────────────
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --manifest-path bindings/python/rust/Cargo.toml --check
      - name: cargo clippy (bindings)
        run: cargo clippy --manifest-path bindings/python/rust/Cargo.toml -- -D warnings
      - name: cargo clippy (core)
        run: cargo clippy -p aster_transport_core -- -D warnings
      - name: cargo clippy (ffi)
        run: cargo clippy -p aster_transport_ffi -- -D warnings

  # ── Python bindings: unit tests (fast, no networking) ──────────────
  test-unit:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build and run unit tests
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout maturin
          uv pip install "blake3>=1.0.8" "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ -v --timeout=30 -m "not network"
        shell: bash

  # ── Python bindings: full test matrix (includes networking) ────────
  test-full:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            label: linux-x64
            shell: bash
          - runner: [self-hosted, Linux, ARM64]
            label: linux-arm64
            shell: bash
          - runner: [self-hosted, macOS, ARM64]
            label: macos-arm64
            shell: bash
          - runner: [self-hosted, Windows, X64]
            label: windows-x64
            shell: pwsh
    runs-on: ${{ matrix.runner }}
    name: test-full (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        if: runner.os == 'Linux'
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build and test (unix)
        if: matrix.shell == 'bash'
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "blake3>=1.0.8" "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ -v --timeout=60 --reruns=2 --reruns-delay=2
        shell: bash

      - name: Build and test (Windows)
        if: matrix.shell == 'pwsh'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          uv venv .venv
          .venv\Scripts\activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "blake3>=1.0.8" "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop -m bindings/python/rust/Cargo.toml
          uv pip install -e cli/
          uv run pytest tests/python/ -v --timeout=60 --reruns=2 --reruns-delay=2
        shell: pwsh

  # ── Rust core tests (no Python dependency) ─────────────────────────
  test-rust:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: cargo test (core)
        run: cargo test -p aster_transport_core
      - name: cargo test (ffi)
        run: cargo test -p aster_transport_ffi

  # ── API docs generation ──────────────────────────────────────────
  docs:
    needs: test-unit
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build and generate docs
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin pdoc
          uv pip install "blake3>=1.0.8" "pyfory==0.16.0" "zstandard>=0.25.0"
          uv run maturin develop -m bindings/python/rust/Cargo.toml
          uv run pdoc --no-include-undocumented -o docs/python aster.public
        shell: bash
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs-python
          path: docs/python/

