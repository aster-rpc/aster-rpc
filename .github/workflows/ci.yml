name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'ffi_spec/**'
      - '*.md'
      - 'README.md'
      - 'LICENSE*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'ffi_spec/**'
      - '*.md'
      - 'README.md'
      - 'LICENSE*'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt #, clippy
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: lint
      - name: cargo fmt
        run: cargo fmt --manifest-path bindings/python/rust/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path bindings/python/rust/Cargo.toml -- -D warnings

  # ── Build + Test matrix ────────────────────────────────────────────
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies/build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: test-${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build and test (unix)
        if: runner.os != 'Windows'
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "blake3>=1.0.8" "pyfory==0.16.0" "zstandard>=0.25.0"
          uv pip install -e cli/

          echo "=== Environment parity diagnostics ==="
          uv --version
          uv run python -VV
          uv pip freeze | grep -E '^(pyfory|zstandard|blake3|pytest|pytest-asyncio|pytest-timeout|maturin|cython|Cython)==' || true
          uv run python - <<'PY'
          import importlib
          import platform
          import sys

          print("python:", sys.version.replace("\n", " "))
          print("platform:", platform.platform())

          try:
              import pyfory
              print("pyfory:", getattr(pyfory, "__version__", "unknown"))
              print("pyfory.__file__:", pyfory.__file__)

              try:
                  mod = importlib.import_module("pyfory.includes.libformat")
                  print("pyfory.includes.libformat:", getattr(mod, "__file__", "<built-in>"))
                  print("has CTypeId:", hasattr(mod, "CTypeId"))
              except Exception as exc:
                  print("import pyfory.includes.libformat failed:", repr(exc))
          except Exception as exc:
              print("import pyfory failed:", repr(exc))
          PY

          uv run maturin develop -m bindings/python/rust/Cargo.toml
          uv run pytest tests/python/ -v --timeout=60
        shell: bash

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: |
          uv venv .venv
          .venv\Scripts\activate
          uv pip install pytest pytest-asyncio pytest-timeout pytest-rerunfailures maturin
          uv pip install "blake3>=1.0.8" "pyfory==0.16.0" "zstandard>=0.25.0"
          uv pip install -e cli/

          Write-Host "=== Environment parity diagnostics ==="
          uv --version
          uv run python -VV
          uv pip freeze | Select-String -Pattern '^(pyfory|zstandard|blake3|pytest|pytest-asyncio|pytest-timeout|maturin|cython|Cython)=='
          $script = @'
          import importlib
          import platform
          import sys

          print("python:", sys.version.replace("\n", " "))
          print("platform:", platform.platform())

          try:
              import pyfory
              print("pyfory:", getattr(pyfory, "__version__", "unknown"))
              print("pyfory.__file__:", pyfory.__file__)

              try:
                  mod = importlib.import_module("pyfory.includes.libformat")
                  print("pyfory.includes.libformat:", getattr(mod, "__file__", "<built-in>"))
                  print("has CTypeId:", hasattr(mod, "CTypeId"))
              except Exception as exc:
                  print("import pyfory.includes.libformat failed:", repr(exc))
          except Exception as exc:
              print("import pyfory failed:", repr(exc))
          '@
          uv run python -c $script

          uv run maturin develop -m bindings/python/rust/Cargo.toml
          uv run pytest tests/python/ -v --timeout=60
        shell: pwsh
