name: Build & Publish Java

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'bindings/java/**'
      - 'core/**'
      - 'ffi/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-java.yml'
  pull_request:
    paths:
      - 'bindings/java/**'
      - 'core/**'
      - 'ffi/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-java.yml'
  workflow_dispatch:

concurrency:
  group: build-java-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "25"
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Per-platform build: tests + classifier jar ──────────────────────
  # Each runner builds the FFI lib for its host platform, runs the
  # full Java test suite (which loads the freshly-built lib via the
  # workspace fallback in IrohLibrary), then packages a classifier
  # jar containing ONLY native/<os>-<arch>/lib... The main
  # (classifier-less) jar is identical across platforms, so only the
  # canonical platform uploads it.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs-on: [self-hosted, Linux, X64]
            classifier: linux-x86_64
            canonical: true
          - label: macos-aarch64
            runs-on: [self-hosted, macOS, ARM64]
            classifier: macos-aarch64
            canonical: false
    runs-on: ${{ matrix.runs-on }}
    name: build (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Bundle FFI lib for ${{ matrix.classifier }}
        run: ./bindings/java/scripts/bundle-ffi.sh
      - name: Build, test, and package classifier jar
        working-directory: bindings/java
        # Examples modules are demo apps with timing-sensitive e2e tests
        # and aren't published, so skip them. Published modules:
        # aster-annotations, aster-codegen-core, aster-codegen-apt,
        # aster-codegen-ksp, aster-runtime.
        run: |
          mvn -B package -Dnative.classifier=${{ matrix.classifier }} \
            -pl '!aster-examples-mission-control,!aster-examples-mission-control-guide' \
            --no-transfer-progress
      - name: Upload classifier jar
        uses: actions/upload-artifact@v4
        with:
          name: aster-runtime-${{ matrix.classifier }}
          path: bindings/java/aster-runtime/target/aster-runtime-*-${{ matrix.classifier }}.jar
          if-no-files-found: error
      - name: Upload classifier-less main jar (canonical only)
        if: matrix.canonical == true
        uses: actions/upload-artifact@v4
        with:
          name: aster-runtime-main
          # The canonical runner's target/ has BOTH the default jar and
          # its own classifier jar. Exclude the classifier suffix so this
          # artifact contains only the platform-independent main jar.
          path: |
            bindings/java/aster-runtime/target/aster-runtime-*.jar
            !bindings/java/aster-runtime/target/aster-runtime-*-${{ matrix.classifier }}.jar
          if-no-files-found: error

  # ── Deploy SNAPSHOT to GitHub Packages (main pushes only) ───────────
  publish-dev:
    name: Publish SNAPSHOT to GitHub Packages
    needs: [build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Show artifact layout
        run: ls -la artifacts/ artifacts/*/
      - name: Deploy main jar (no classifier) + classifier jars
        working-directory: bindings/java
        # Find the classifier-less main jar (filename has no -<a-z>...
        # suffix between the version and `.jar`) and deploy it once.
        # Then for each artifacts/aster-runtime-<classifier>/ dir,
        # deploy that jar with the right `-Dclassifier=<classifier>`.
        # Using deploy:deploy-file lets us push pre-built jars from
        # multiple platforms under one consistent set of coordinates.
        run: |
          set -euo pipefail

          REPO_URL="https://maven.pkg.github.com/aster-rpc/aster-rpc-internal"

          # aster-runtime-main artifact contains only the classifier-less
          # main jar (the canonical-platform upload-artifact step excludes
          # its own classifier suffix).
          MAIN_JAR=$(ls ../../artifacts/aster-runtime-main/aster-runtime-*.jar | head -1)
          test -n "$MAIN_JAR" || { echo "no main jar found in artifacts/aster-runtime-main/"; exit 1; }
          echo "Deploying main jar: $MAIN_JAR"
          mvn -B deploy:deploy-file --no-transfer-progress \
            -Dfile="$MAIN_JAR" \
            -DpomFile=aster-runtime/pom.xml \
            -DrepositoryId=github \
            -Durl="$REPO_URL"

          for d in ../../artifacts/aster-runtime-linux-x86_64 ../../artifacts/aster-runtime-macos-aarch64; do
            [ -d "$d" ] || continue
            JAR=$(ls "$d"/aster-runtime-*.jar | head -1)
            CLASSIFIER=$(basename "$d" | sed 's/^aster-runtime-//')
            echo "Deploying classifier jar: $JAR ($CLASSIFIER)"
            mvn -B deploy:deploy-file --no-transfer-progress \
              -Dfile="$JAR" \
              -DpomFile=aster-runtime/pom.xml \
              -Dclassifier="$CLASSIFIER" \
              -Dpackaging=jar \
              -DrepositoryId=github \
              -Durl="$REPO_URL"
          done
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy sibling modules (annotations, codegen)
        working-directory: bindings/java
        # These modules don't depend on platform — rebuild and deploy
        # them from the canonical runner. They're cheap (Java-only).
        run: |
          mvn -B -pl aster-annotations,aster-codegen-core,aster-codegen-apt,aster-codegen-ksp \
            -am deploy -DskipTests --no-transfer-progress
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
