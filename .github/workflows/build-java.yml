name: Build & Publish Java

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'bindings/java/**'
      - '.github/workflows/build-java.yml'
  workflow_dispatch:

concurrency:
  group: build-java-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "25"

jobs:
  # ── Build + test ────────────────────────────────────────────────────
  build:
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: bindings/java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build and test
        run: mvn -B package --no-transfer-progress
      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: java-jars
          path: bindings/java/**/target/*.jar

  # ── Deploy SNAPSHOT to GitHub Packages (main pushes) ────────────────
  publish-dev:
    name: Publish SNAPSHOT to GitHub Packages
    needs: [build]
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: bindings/java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Deploy SNAPSHOT
        run: mvn -B deploy -DskipTests --no-transfer-progress
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
