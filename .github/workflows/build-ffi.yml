name: Build & Publish FFI

# Authoritative builder for the C-ABI native library
# `libaster_transport_ffi.{so,dylib,dll}`. This is the shared artifact that
# the .NET, Java, and (future) Go bindings consume -- we publish once per
# platform here instead of having every binding workflow rebuild it.
#
# Outputs per platform are published as:
#   - workflow artifact `ffi-native-<rid>` (consumed by the same run via
#     workflow_run downstream)
#   - file in the GitHub Release: `libaster_transport_ffi-<rid>.tar.gz`
#     attached to either the internal `ffi-dev-<N>` prerelease (main pushes)
#     or the public `v*` release (tag pushes).
#
# Consumer workflows (build-dotnet.yml, future build-java.yml, future
# build-go.yml) trigger via `workflow_run: [Build & Publish FFI]` and
# download the natives by `gh release download`.

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "!cli-v*"
    paths:
      - 'core/**'
      - 'ffi/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-ffi.yml'
  workflow_dispatch:

concurrency:
  group: build-ffi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  # ── Compute version (matches build.yml's scheme) ────────────────────
  version:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute version
        id: ver
        run: |
          BASE_VERSION=$(grep '^version' ffi/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Show version
        run: |
          echo "Version: ${{ steps.ver.outputs.version }}"
          echo "Release: ${{ steps.ver.outputs.is_release }}"

  # ── Build native FFI lib per platform ──────────────────────────────
  build-native:
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: [self-hosted, Linux, X64]
            lib: libaster_transport_ffi.so
            rid: linux-x64
          - target: aarch64-unknown-linux-gnu
            runner: [self-hosted, Linux, ARM64]
            lib: libaster_transport_ffi.so
            rid: linux-arm64
          - target: aarch64-apple-darwin
            runner: [self-hosted, macOS, ARM64]
            lib: libaster_transport_ffi.dylib
            rid: osx-arm64
          - target: x86_64-pc-windows-msvc
            runner: [self-hosted, Windows, X64]
            lib: aster_transport_ffi.dll
            rid: win-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Build FFI lib
        run: cargo build --release -p aster_transport_ffi
      - name: Upload native lib (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ffi-native-${{ matrix.rid }}
          path: target/release/${{ matrix.lib }}
          if-no-files-found: error

  # ── Stage tarballs (one job, all RIDs) ─────────────────────────────
  package:
    needs: [version, build-native]
    runs-on: [self-hosted, Linux, X64]
    outputs:
      tarball_count: ${{ steps.pack.outputs.count }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ffi-native-*
          path: artifacts
      - name: Pack per-RID tarballs
        id: pack
        run: |
          mkdir -p dist
          count=0
          for dir in artifacts/ffi-native-*; do
            rid="${dir##*ffi-native-}"
            tar -czf "dist/libaster_transport_ffi-${rid}.tar.gz" -C "$dir" .
            count=$((count + 1))
          done
          (cd dist && sha256sum libaster_transport_ffi-*.tar.gz > FFI-SHA256SUMS)
          ls -lh dist/
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ffi-tarballs
          path: dist/

  # ── Internal dev release (main pushes) ─────────────────────────────
  dev-release:
    name: Publish FFI Dev Release
    runs-on: [self-hosted, Linux, X64]
    if: ${{ needs.version.outputs.is_release == 'false' && github.ref == 'refs/heads/main' }}
    needs: [version, package]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ffi-tarballs
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - name: Create FFI dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ffi-dev-${{ github.run_number }}
          name: "FFI Dev Build #${{ github.run_number }} (${{ needs.version.outputs.version }})"
          prerelease: true
          make_latest: false
          body: |
            Automated `libaster_transport_ffi` build from `main` at ${{ github.sha }}.

            **Version:** `${{ needs.version.outputs.version }}`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ## Consumed by

            Downstream language workflows (`build-dotnet`, future `build-java`,
            future `build-go`) trigger via `workflow_run` and pull the matching
            tarball with `gh release download ffi-dev-${{ github.run_number }}`.

            ## Manual download

            ```bash
            gh release download ffi-dev-${{ github.run_number }} \
              --repo ${{ github.repository }} \
              --pattern 'libaster_transport_ffi-*.tar.gz'
            ```
          files: dist/*
      - name: Prune old ffi-dev releases (keep last 2)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(
              github.rest.repos.listReleases, { owner, repo }
            );
            const devReleases = releases
              .filter(r => r.tag_name.startsWith('ffi-dev-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = devReleases.slice(2);
            for (const rel of toDelete) {
              console.log(`Deleting release ${rel.tag_name} (${rel.id})`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` });
              } catch (e) {
                console.log(`Tag ${rel.tag_name} already gone: ${e.message}`);
              }
            }

  # ── Tag release: attach natives to the v* release ──────────────────
  # The Python `build.yml` `release` job creates the v* GitHub Release
  # with wheels. This job uploads the FFI tarballs as additional assets
  # on that same release. softprops/action-gh-release upserts files, so
  # ordering against build.yml's release job doesn't matter.
  tag-release-attach:
    name: Attach natives to v* release
    runs-on: [self-hosted, Linux, X64]
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, package]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ffi-tarballs
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - name: Upload natives to v* release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
