[build-system]
requires      = ["maturin>=1.6,<2"]
build-backend = "maturin"

[project]
name    = "aster-python"
version = "0.1.0"
description = "Python bindings for the Iroh peer-to-peer networking library"
requires-python = ">=3.9"
dependencies = []

[tool.maturin]
module-name    = "aster_python._aster_python"
manifest-path  = "bindings/aster_python_rs/Cargo.toml"
features       = ["pyo3/extension-module"]
python-source  = "bindings"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests/python"]